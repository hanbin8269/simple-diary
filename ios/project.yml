name: IlgiMobile
options:
  deploymentTarget:
    iOS: "17.0"
targets:
  IlgiMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Files shared with the macOS app
      - path: ../Sources/Ilgi/Formatters.swift
      - path: ../Sources/Ilgi/Theme.swift
      - path: ../Sources/Ilgi/BiometricGate.swift
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Simple Diary
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSFaceIDUsageDescription: 지난 일기를 보호하기 위해 Face ID를 사용합니다.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hanbin.ilgi.mobile
        PRODUCT_NAME: Simple Diary
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
